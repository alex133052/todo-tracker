<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Tracker Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-card: white;
            --bg-input: white;
            --bg-secondary: #f8f9fa;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --border-color: #ddd;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body.dark-theme {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --bg-card: #2d3748;
            --bg-input: #4a5568;
            --bg-secondary: #1a202c;
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --border-color: #4a5568;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            padding: 20px; 
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            box-shadow: var(--shadow); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        
        .stat-card { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center; 
            box-shadow: var(--shadow);
            color: var(--text-primary);
        }
        
        .stat-card h3 { font-size: 2rem; margin-bottom: 5px; color: var(--text-primary); }
        .stat-card p { color: var(--text-secondary); }
        
        .main-content { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: var(--shadow);
            color: var(--text-primary);
        }
        
        .btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: all 0.3s; 
            white-space: nowrap;
        }
        
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-theme { 
            background: transparent; 
            border: 2px solid var(--text-primary);
            color: var(--text-primary);
            padding: 8px 16px;
        }
        
        .form-input, .form-select { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid var(--border-color); 
            border-radius: 5px; 
            font-size: 1rem;
            background: var(--bg-input);
            color: var(--text-primary);
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
            color: var(--text-primary);
        }
        
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            padding: 20px;
        }
        
        .modal.active { display: flex; }
        
        .modal-content { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 10px; 
            max-width: 500px; 
            width: 100%;
            max-height: 90vh; 
            overflow-y: auto;
            color: var(--text-primary);
        }
        
        .todo-list { margin-top: 20px; }
        
        .todo-card { 
            background: var(--bg-secondary); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border-left: 4px solid #667eea; 
            transition: transform 0.2s;
        }
        
        .todo-card:hover { transform: translateX(5px); }
        .priority-high { border-left-color: #e74c3c; }
        .priority-medium { border-left-color: #f39c12; }
        .priority-low { border-left-color: #2ecc71; }
        
        .todo-card h3 { margin-bottom: 10px; color: var(--text-primary); }
        .todo-card p { color: var(--text-secondary); margin-bottom: 10px; }
        
        .todo-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        
        .badge { 
            padding: 4px 10px; 
            border-radius: 12px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            color: white; 
            display: inline-block;
        }
        
        .badge-high { background: #e74c3c; }
        .badge-medium { background: #f39c12; }
        .badge-low { background: #2ecc71; }
        .category-badge { background: #3498db; }
        .tag-badge { background: #95a5a6; padding: 3px 8px; border-radius: 10px; font-size: 0.75rem; color: white; }
        
        .todo-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .btn-small { padding: 6px 12px; font-size: 0.9rem; }
        .completed { opacity: 0.6; text-decoration: line-through; }
        
        .auth-form { 
            max-width: 400px; 
            margin: 50px auto; 
            background: var(--bg-card); 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: var(--shadow);
        }
        
        .hidden { display: none !important; }

        .filters-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .filters-bar .form-input,
        .filters-bar .form-select {
            margin: 0;
            flex: 1;
            min-width: 150px;
        }

        .user-card {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            header { flex-direction: column; text-align: center; padding: 15px; }
            .header-left { flex-direction: column; width: 100%; }
            .stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-card { padding: 15px 10px; }
            .stat-card h3 { font-size: 1.5rem; }
            .main-content { padding: 15px; }
            .filters-bar { flex-direction: column; padding: 10px; }
            .filters-bar .form-input,
            .filters-bar .form-select { width: 100%; min-width: 100%; }
            .todo-actions { flex-direction: column; }
            .todo-actions .btn { width: 100%; text-align: center; }
            .btn { padding: 10px 16px; font-size: 0.9rem; }
            .modal-content { padding: 20px; }
        }

        @media (max-width: 480px) {
            .stats { grid-template-columns: repeat(3, 1fr); }
            .stat-card h3 { font-size: 1.2rem; }
            .stat-card p { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="auth-section" class="auth-form">
            <h2 id="auth-title">Вход</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Войти</button>
            </form>
            <p style="text-align: center; margin-top: 15px;">
                <a href="#" id="toggle-auth">Нет аккаунта? Зарегистрироваться</a>
            </p>
        </div>

        <div id="main-section" class="hidden">
            <header>
                <div class="header-left">
                    <h1>📋 Todo Tracker Pro</h1>
                    <span id="user-email" style="font-weight: bold;"></span>
                </div>
                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <button class="btn btn-theme" onclick="toggleTheme()" id="theme-btn">🌙</button>
                    <button id="admin-btn" class="btn btn-primary hidden" onclick="openAdminModal()" style="display: none;">🛡️ Админка</button>
                    <button class="btn btn-danger" onclick="logout()">Выйти</button>
                </div>
            </header>

            <div class="stats">
                <div class="stat-card"><h3 id="stat-total">0</h3><p>Всего задач</p></div>
                <div class="stat-card"><h3 id="stat-completed">0</h3><p>Выполнено</p></div>
                <div class="stat-card"><h3 id="stat-pending">0</h3><p>В процессе</p></div>
                <div class="stat-card"><h3 id="stat-overdue">0</h3><p>Просрочено</p></div>
                <div class="stat-card"><h3 id="stat-rate">0%</h3><p>Успешность</p></div>
            </div>

            <div class="main-content">
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="openModal()" style="flex: 1; min-width: 150px;">+ Новая задача</button>
                    <button class="btn btn-success" onclick="exportToCSV()" style="flex: 1; min-width: 150px;">📥 Скачать CSV</button>
                </div>

                <div class="filters-bar">
                    <input type="text" id="search-input" class="form-input" placeholder="🔍 Поиск..." style="margin: 0;">
                    <select id="filter-priority" class="form-select" style="margin: 0;">
                        <option value="all">Все приоритеты</option>
                        <option value="high">🔥 Высокий</option>
                        <option value="medium">⚠️ Средний</option>
                        <option value="low">✅ Низкий</option>
                    </select>
                    <select id="filter-category" class="form-select" style="margin: 0;">
                        <option value="all">Все категории</option>
                        <option value="Работа">Работа</option>
                        <option value="Личное">Личное</option>
                        <option value="Покупки">Покупки</option>
                        <option value="Здоровье">Здоровье</option>
                        <option value="Общее">Общее</option>
                    </select>
                </div>

                <div id="todo-list" class="todo-list"></div>
            </div>
        </div>
    </div>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Новая задача</h2>
            <form id="task-form">
                <div class="form-group"><label>Название задачи *</label><input type="text" id="task-title" class="form-input" required></div>
                <div class="form-group"><label>Описание</label><textarea id="task-description" class="form-input" rows="3"></textarea></div>
                <div class="form-group"><label>Категория</label>
                    <select id="task-category" class="form-select">
                        <option value="Общее">Общее</option><option value="Работа">Работа</option><option value="Личное">Личное</option><option value="Покупки">Покупки</option><option value="Здоровье">Здоровье</option>
                    </select>
                </div>
                <div class="form-group"><label>Приоритет</label>
                    <select id="task-priority" class="form-select">
                        <option value="low">✅ Низкий</option><option value="medium" selected>⚠️ Средний</option><option value="high">🔥 Высокий</option>
                    </select>
                </div>
                <div class="form-group"><label>Теги (через запятую)</label><input type="text" id="task-tags" class="form-input" placeholder="срочно, важно"></div>
                <div class="form-group"><label>Срок</label><input type="date" id="task-due-date" class="form-input"></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1">Сохранить</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()" style="flex: 1">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ✅ МОДАЛЬНОЕ ОКНО АДМИНКИ -->
    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <h2>🛡️ Ожидают подтверждения</h2>
            <div id="pending-users-list" style="margin-top: 20px;">
                <p style="text-align: center; color: var(--text-secondary);">Загрузка...</p>
            </div>
            <button class="btn btn-danger" onclick="closeAdminModal()" style="margin-top: 20px; width: 100%">Закрыть</button>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let isRegistering = false;
        let editingTodoId = null;
        let todos = [];

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            document.getElementById('theme-btn').textContent = '☀️';
        }

        if (token) {
            showMainSection();
        }

        document.getElementById('toggle-auth').addEventListener('click', (e) => {
            e.preventDefault();
            isRegistering = !isRegistering;
            document.getElementById('auth-title').textContent = isRegistering ? 'Регистрация' : 'Вход';
            e.target.textContent = isRegistering ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться';
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (isRegistering) {
                    await fetch('/auth/register', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
                    });
                    alert('Регистрация успешна! Проверьте email.');
                } else {
                    const res = await fetch('/token', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
                    });
                    if (res.ok) {
                        const data = await res.json();
                        token = data.access_token;
                        localStorage.setItem('token', token);
                        localStorage.setItem('email', email);
                        showMainSection();
                    } else {
                        const error = await res.json();
                        alert('Ошибка: ' + (error.detail || 'Неверный email или пароль'));
                    }
                }
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        });

        function showMainSection() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            const userEmail = localStorage.getItem('email');
            if (userEmail) document.getElementById('user-email').textContent = userEmail;
            loadTodos();
            loadStatistics();
            checkAdmin();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('email');
            token = null;
            location.reload();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
        }

        async function loadTodos() {
            try {
                const res = await fetch('/todos', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    todos = await res.json();
                    applyFilters();
                }
            } catch (err) { console.error(err); }
        }

        async function loadStatistics() {
            try {
                const res = await fetch('/statistics', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const s = await res.json();
                    document.getElementById('stat-total').textContent = s.total;
                    document.getElementById('stat-completed').textContent = s.completed;
                    document.getElementById('stat-pending').textContent = s.pending;
                    document.getElementById('stat-overdue').textContent = s.overdue;
                    document.getElementById('stat-rate').textContent = s.completion_rate + '%';
                }
            } catch (err) {}
        }

        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const priorityFilter = document.getElementById('filter-priority').value;
            const categoryFilter = document.getElementById('filter-category').value;

            const filteredTodos = todos.filter(todo => {
                const matchesSearch = todo.title.toLowerCase().includes(searchTerm) || 
                                      (todo.description && todo.description.toLowerCase().includes(searchTerm));
                const matchesPriority = (priorityFilter === 'all') || (todo.priority === priorityFilter);
                const matchesCategory = (categoryFilter === 'all') || (todo.category === categoryFilter);
                return matchesSearch && matchesPriority && matchesCategory;
            });

            renderTodos(filteredTodos);
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('filter-priority').addEventListener('change', applyFilters);
        document.getElementById('filter-category').addEventListener('change', applyFilters);

        function renderTodos(todos) {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            if (todos.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">Нет задач 📝</p>';
                return;
            }
            todos.forEach(todo => {
                const card = document.createElement('div');
                card.className = `todo-card priority-${todo.priority} ${todo.completed ? 'completed' : ''}`;
                
                let tagsHtml = '';
                if (todo.tags) {
                    tagsHtml = todo.tags.split(',').map(tag => `<span class="tag-badge">${tag.trim()}</span>`).join('');
                }

                const priorityText = todo.priority === 'high' ? '🔥 Высокий' : (todo.priority === 'medium' ? '⚠️ Средний' : '✅ Низкий');

                card.innerHTML = `
                    <h3>${todo.title}</h3>
                    <p>${todo.description || ''}</p>
                    <div class="todo-meta">
                        <span class="badge badge-${todo.priority}">${priorityText}</span>
                        <span class="badge category-badge">${todo.category}</span>
                        ${todo.due_date ? `<span class="badge" style="background: #9b59b6">📅 ${new Date(todo.due_date).toLocaleDateString('ru-RU')}</span>` : ''}
                    </div>
                    ${tagsHtml ? `<div style="margin-top: 10px">${tagsHtml}</div>` : ''}
                    <div class="todo-actions">
                        <button class="btn btn-success btn-small" onclick="toggleComplete(${todo.id})">${todo.completed ? '↩️ Вернуть' : '✔️ Выполнить'}</button>
                        <button class="btn btn-primary btn-small" onclick="editTodo(${todo.id})">✏️ Ред.</button>
                        <button class="btn btn-danger btn-small" onclick="deleteTodo(${todo.id})">🗑️ Удалить</button>
                    </div>`;
                list.appendChild(card);
            });
        }

        function openModal() {
            document.getElementById('task-modal').classList.add('active');
            document.getElementById('modal-title').textContent = 'Новая задача';
            document.getElementById('task-form').reset();
            document.getElementById('task-priority').value = 'medium';
            editingTodoId = null;
        }
        function closeModal() { document.getElementById('task-modal').classList.remove('active'); }

        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const todoData = {
                title: document.getElementById('task-title').value,
                description: document.getElementById('task-description').value,
                category: document.getElementById('task-category').value,
                priority: document.getElementById('task-priority').value,
                tags: document.getElementById('task-tags').value,
                due_date: document.getElementById('task-due-date').value
            };
            try {
                if (editingTodoId) {
                    await fetch(`/todos/${editingTodoId}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(todoData) });
                } else {
                    await fetch('/todos', { method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(todoData) });
                }
                closeModal();
                loadTodos();
                loadStatistics();
            } catch (err) { alert('Ошибка сохранения'); }
        });

        async function toggleComplete(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                await fetch(`/todos/${id}`, { method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ completed: !todo.completed }) });
                loadTodos(); loadStatistics();
            }
        }
        async function editTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                document.getElementById('modal-title').textContent = 'Редактировать';
                document.getElementById('task-title').value = todo.title;
                document.getElementById('task-description').value = todo.description || '';
                document.getElementById('task-category').value = todo.category;
                document.getElementById('task-priority').value = todo.priority;
                document.getElementById('task-tags').value = todo.tags || '';
                document.getElementById('task-due-date').value = todo.due_date || '';
                editingTodoId = id;
                document.getElementById('task-modal').classList.add('active');
            }
        }
        async function deleteTodo(id) {
            if (confirm('Удалить?')) {
                await fetch(`/todos/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                loadTodos(); loadStatistics();
            }
        }
        async function exportToCSV() {
            try {
                const res = await fetch('/todos/export/csv', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'tasks.csv'; document.body.appendChild(a); a.click();
                }
            } catch (err) { alert('Ошибка экспорта'); }
        }

        // ✅ АДМИНКА
        function checkAdmin() {
            const userEmail = localStorage.getItem('email');
            const adminBtn = document.getElementById('admin-btn');
            if (userEmail === 'alex1330@gmail.com') {
                adminBtn.style.display = 'block';
                adminBtn.classList.remove('hidden');
            } else {
                adminBtn.style.display = 'none';
                adminBtn.classList.add('hidden');
            }
        }

        async function openAdminModal() {
            document.getElementById('admin-modal').classList.add('active');
            await loadPendingUsers();
        }

        function closeAdminModal() {
            document.getElementById('admin-modal').classList.remove('active');
        }

        async function loadPendingUsers() {
            const list = document.getElementById('pending-users-list');
            list.innerHTML = '<p style="text-align: center;">Загрузка...</p>';
            
            try {
                const res = await fetch('/admin/pending-users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    const users = await res.json();
                    
                    if (users.length === 0) {
                        list.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">Нет ожидающих пользователей ✅</p>';
                        return;
                    }
                    
                    list.innerHTML = users.map(user => `
                        <div class="user-card">
                            <div>
                                <strong style="color: var(--text-primary);">${user.email}</strong>
                                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 5px;">
                                    📅 ${new Date(user.created_at).toLocaleString('ru-RU')}
                                </p>
                            </div>
                            <button class="btn btn-success btn-small" onclick="verifyUser(${user.id})">
                                ✅ Подтвердить
                            </button>
                        </div>
                    `).join('');
                    
                } else {
                    list.innerHTML = '<p style="text-align: center; color: #e74c3c;">Ошибка загрузки</p>';
                }
            } catch (err) {
                console.error(err);
                list.innerHTML = '<p style="text-align: center; color: #e74c3c;">Ошибка сети</p>';
            }
        }

        async function verifyUser(userId) {
            if (!confirm('Подтвердить этого пользователя?')) return;
            
            try {
                const res = await fetch(`/admin/verify/${userId}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (res.ok) {
                    alert('Пользователь подтверждён! ✅');
                    await loadPendingUsers();
                } else {
                    alert('Ошибка при подтверждении');
                }
            } catch (err) {
                console.error(err);
                alert('Ошибка сети');
            }
        }

        document.getElementById('task-modal').addEventListener('click', (e) => { if (e.target.id === 'task-modal') closeModal(); });
        document.getElementById('admin-modal').addEventListener('click', (e) => { if (e.target.id === 'admin-modal') closeAdminModal(); });
    </script>
</body>
</html>
