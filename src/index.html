<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Todo Tracker Pro</title>
    <style>
        /* === ПЕРЕМЕННЫЕ (СВЕТЛАЯ ТЕМА ПО УМОЛЧАНИЮ) === */
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sec: #666666;
            --input-bg: #ffffff;
            --input-border: #dddddd;
            --badge-bg: #667eea;
            --badge-text: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --hover-bg: #f5f5f5;
            --danger: #f44336;
            --success: #4caf50;
            --warning: #ff9800;
            --primary: #667eea;
        }

        /* === ТЁМНАЯ ТЕМА === */
        .dark-theme {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sec: #94a3b8;
            --input-bg: #334155;
            --input-border: #475569;
            --badge-bg: #3b82f6;
            --badge-text: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.5);
            --hover-bg: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            min-height: 100dvh;
            padding: 1rem; 
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 { font-size: 1.5rem; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn-icon { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            padding: 10px 14px; 
            color: white; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1.2rem;
            min-width: 44px;
            min-height: 44px;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.4); }
        .logout-btn { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            padding: 10px 15px; 
            color: white; 
            border-radius: 12px; 
            cursor: pointer;
            min-width: 44px;
            min-height: 44px;
        }
        
        /* Stats */
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 1rem; 
            margin-bottom: 2rem; 
        }
        .stat-card { 
            background: var(--card-bg); 
            color: var(--text-main); 
            padding: 1.5rem; 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
            text-align: center; 
        }
        .stat-value { 
            font-size: 2rem; 
            font-weight: bold; 
            color: var(--primary); 
        }
        .dark-theme .stat-value { color: #60a5fa; }
        .stat-label { color: var(--text-sec); margin-top: 0.5rem; font-size: 0.85rem; }
        
        /* Auth */
        .auth-container { 
            background: var(--card-bg); 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: var(--shadow); 
            max-width: 400px; 
            margin: 50px auto; 
            text-align: center; 
            color: var(--text-main); 
        }
        .auth-input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 2px solid var(--input-border); 
            border-radius: 12px; 
            background: var(--input-bg); 
            color: var(--text-main);
            font-size: 16px;
        }
        .auth-btn { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem; 
            margin-top: 10px;
            min-height: 48px;
        }
        .auth-switch { margin-top: 15px; font-size: 0.9rem; color: var(--text-sec); cursor: pointer; text-decoration: underline; }
        
        /* Cards */
        .card { 
            background: var(--card-bg); 
            padding: 1.5rem; 
            border-radius: 16px; 
            box-shadow: var(--shadow); 
            margin-bottom: 20px; 
            color: var(--text-main); 
        }
        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .form-grid input, .form-grid select { 
            padding: 12px; 
            border: 2px solid var(--input-border); 
            border-radius: 12px; 
            background: var(--input-bg); 
            color: var(--text-main);
            font-size: 16px;
            min-height: 44px;
        }
        .add-btn { 
            grid-column: 1 / -1; 
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 10px;
            min-height: 48px;
            font-size: 1rem;
        }
        .add-btn:hover { opacity: 0.9; }
        
        /* Toolbar */
        .toolbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            flex-wrap: wrap;
            gap: 10px;
        }
        .csv-btn { 
            background: var(--warning); 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9rem;
            min-height: 44px;
        }
        .csv-btn:hover { opacity: 0.9; }

        /* Tasks */
        .task-list { list-style: none; padding: 0; margin-top: 1rem; }
        .task-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            padding: 16px; 
            background: var(--hover-bg); 
            margin-bottom: 10px; 
            border-radius: 12px; 
            border-left: 4px solid var(--primary); 
            color: var(--text-main); 
        }
        .task-item.completed { opacity: 0.6; text-decoration: line-through; border-left-color: #ccc; }
        .task-item.overdue { border-left-color: var(--danger); }
        .task-content { flex: 1; min-width: 0; }
        .task-title { font-weight: 600; margin-bottom: 6px; word-wrap: break-word; }
        .task-meta { font-size: 0.85rem; color: var(--text-sec); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .category-badge { background: var(--badge-bg); color: var(--badge-text); padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; }
        .due-date { color: var(--danger); font-weight: 600; }
        .task-actions { 
            display: flex; 
            gap: 8px; 
            margin-left: 10px; 
            flex-shrink: 0;
        }
        .task-actions button { 
            padding: 8px 12px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            color: white;
            font-size: 1.1rem;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-done { background: var(--success); }
        .btn-del { background: var(--danger); }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-sec); }
        
        .hidden { display: none !important; }

        /* ============================ */
        /* === 📱 МОБИЛЬНАЯ АДАПТАЦИЯ === */
        /* ============================ */
        
        @media (max-width: 768px) {
            body { padding: 0.75rem; }
            .header { flex-direction: column; text-align: center; gap: 12px; }
            .header h1 { font-size: 1.3rem; }
            .stats { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
            .stat-card { padding: 1rem; }
            .stat-value { font-size: 1.5rem; }
            .form-grid { grid-template-columns: 1fr; }
            .card { padding: 1.25rem; border-radius: 14px; }
        }

        @media (max-width: 480px) {
            body { padding: 0.5rem; }
            .header h1 { font-size: 1.1rem; }
            .stats { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
            .stat-card { padding: 0.75rem; border-radius: 10px; }
            .stat-value { font-size: 1.3rem; }
            .stat-label { font-size: 0.75rem; }
            .card { padding: 1rem; border-radius: 12px; margin-bottom: 12px; }
            .auth-container { margin: 20px 0; padding: 1.5rem; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar h3 { margin-bottom: 8px; }
            .csv-btn { width: 100%; }
            .task-item { flex-direction: column; padding: 12px; }
            .task-content { margin-bottom: 10px; }
            .task-actions { margin-left: 0; width: 100%; justify-content: flex-end; }
            .task-actions button { flex: 1; }
            input, select, button { font-size: 16px !important; }
        }

        @media (max-width: 360px) {
            .stats { grid-template-columns: 1fr; }
            .stat-card { padding: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- AUTH SCREEN -->
        <div id="auth-screen" class="auth-container hidden">
            <h2 id="auth-title">Вход</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email" autocomplete="email">
            <div style="position: relative;">
                <input type="password" id="password" class="auth-input" placeholder="Пароль" autocomplete="current-password" style="padding-right: 50px;">
                <button type="button" onclick="togglePassword()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 5px; color: var(--text-sec);">👁️</button>
            </div>
            <button class="auth-btn" onclick="handleAuth()" id="auth-action-btn">Войти</button>
            <div class="auth-switch" onclick="toggleAuthMode()" id="auth-switch-text">Нет аккаунта? Зарегистрироваться</div>
            <p id="auth-error" style="color: var(--danger); margin-top: 10px; display: none;"></p>
        </div>

        <!-- APP SCREEN -->
        <div id="app-screen" class="hidden">
            <div class="header">
                <h1>📋 Todo Tracker Pro</h1>
                <div class="header-actions">
                    <button class="btn-icon" id="theme-toggle" onclick="toggleTheme()" title="Тёмная тема">🌙</button>
                    <button class="logout-btn" onclick="logout()">Выйти</button>
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats" id="stats"></div>

            <!-- Add Task Form -->
            <div class="card">
                <h3 style="margin-bottom: 1rem;">➕ Новая задача</h3>
                <div class="form-grid">
                    <input type="text" id="task-title" placeholder="Название задачи *" autocomplete="off" style="grid-column: 1 / -1;">
                    <input type="text" id="task-category" placeholder="Категория" value="Общее">
                    <input type="text" id="task-desc" placeholder="Описание">
                    <input type="date" id="task-date">
                    <button class="add-btn" onclick="addTodo()">Добавить задачу</button>
                </div>
            </div>

            <!-- Task List -->
            <div class="card">
                <div class="toolbar">
                    <h3 style="margin: 0;">📝 Мои задачи</h3>
                    <button class="csv-btn" onclick="exportToCSV()">📥 Скачать CSV</button>
                </div>
                <ul id="task-list" class="task-list"></ul>
            </div>
        </div>

    </div>

    <script>
        const API = "";
        let isLogin = true;
        let allTodos = [];
        const ADMIN_EMAIL = "alex1330@gmail.com";

        window.onload = function() {
            const token = localStorage.getItem('token');
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-theme');
                document.getElementById('theme-toggle').innerText = '☀️';
            }
            
            if (token) {
                showApp();
            } else {
                showAuth();
            }
        };

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            document.getElementById('theme-toggle').innerText = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type');
            if (type === 'password') {
                passwordInput.setAttribute('type', 'text');
            } else {
                passwordInput.setAttribute('type', 'password');
            }
        }

        function showAuth() {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            refreshAll();
            checkAdminUI();
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Вход" : "Регистрация";
            document.getElementById('auth-action-btn').innerText = isLogin ? "Войти" : "Создать аккаунт";
            document.getElementById('auth-switch-text').innerText = isLogin ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
            document.getElementById('auth-error').style.display = 'none';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');
            
            try {
                if (isLogin) {
                    const res = await fetch(`${API}/token`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, password })
                    });
                    if (!res.ok) {
                        const error = await res.json();
                        throw new Error(error.detail || 'Неверный логин или пароль');
                    }
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    showApp();
                } else {
                    const res = await fetch(`${API}/auth/register`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, password })
                    });
                    if (!res.ok) throw new Error('Ошибка регистрации');
                    alert('Аккаунт создан! Ожидайте подтверждения администратора.');
                    toggleAuthMode();
                }
            } catch (e) {
                errorEl.innerText = e.message;
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        async function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            };
        }

        // === АДМИН ПАНЕЛЬ ===
        function checkAdminUI() {
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.sub === ADMIN_EMAIL) {
                    const headerActions = document.querySelector('.header-actions');
                    if (!document.getElementById('admin-btn')) {
                        const adminBtn = document.createElement('button');
                        adminBtn.id = 'admin-btn';
                        adminBtn.className = 'btn-icon';
                        adminBtn.innerText = '🛡️';
                        adminBtn.title = 'Панель администратора';
                        adminBtn.onclick = openAdminPanel;
                        headerActions.insertBefore(adminBtn, headerActions.firstChild);
                    }
                }
            } catch (e) {
                console.error('Error checking admin:', e);
            }
        }

        async function openAdminPanel() {
            try {
                const res = await fetch(`${API}/admin/pending-users`, { 
                    headers: await getHeaders() 
                });
                if (!res.ok) throw new Error('Ошибка доступа');
                const users = await res.json();
                
                let html = '<h3 style="margin-bottom:15px;">👥 Ожидают подтверждения</h3>';
                if (users.length === 0) {
                    html += '<p style="color:var(--text-sec);">Нет новых пользователей.</p>';
                } else {
                    html += '<div style="max-height:400px; overflow-y:auto;">';
                    users.forEach(u => {
                        html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--hover-bg); margin-bottom:8px; border-radius:10px;">
                            <div>
                                <div style="font-weight:600; margin-bottom:4px;">${u.email}</div>
                                <div style="font-size:0.75rem; color:var(--text-sec);">${new Date(u.created_at).toLocaleString('ru-RU')}</div>
                            </div>
                            <button class="btn-done" onclick="verifyUser(${u.id})" style="min-width:100px;">✅ Подтвердить</button>
                        </div>`;
                    });
                    html += '</div>';
                }
                
                showAdminModal(html);
                
            } catch (e) {
                alert(e.message);
            }
        }

        function showAdminModal(content) {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; display:flex; justify-content:center; align-items:center;';
            overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
            
            const modal = document.createElement('div');
            modal.style.cssText = 'background:var(--card-bg); padding:25px; border-radius:16px; max-width:500px; width:90%; color:var(--text-main); max-height:80vh; overflow-y:auto;';
            modal.innerHTML = content + '<br><button class="csv-btn" onclick="this.closest(\'div\').closest(\'div\').remove()" style="margin-top:15px; width:100%; min-height:44px;">Закрыть</button>';
            
            overlay.appendChild(modal);
            document.body.appendChild(overlay);
        }

        async function verifyUser(userId) {
            if (!confirm('Подтвердить этого пользователя?')) return;
            try {
                await fetch(`${API}/admin/verify/${userId}`, { 
                    method: 'POST', 
                    headers: await getHeaders() 
                });
                openAdminPanel();
                alert('Пользователь подтвержден!');
            } catch (e) {
                alert('Ошибка подтверждения: ' + e.message);
            }
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API}/statistics`, { headers: await getHeaders() });
                if (!res.ok) return;
                const stats = await res.json();
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${stats.total}</div>
                        <div class="stat-label">Всего задач</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: var(--success)">${stats.completed}</div>
                        <div class="stat-label">Выполнено</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: var(--warning)">${stats.pending}</div>
                        <div class="stat-label">В процессе</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: var(--danger)">${stats.overdue}</div>
                        <div class="stat-label">Просрочено</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #9c27b0">${stats.completion_rate}%</div>
                        <div class="stat-label">Успешность</div>
                    </div>
                `;
            } catch (e) { console.error('Stats error:', e); }
        }

        async function loadTodos() {
            try {
                const res = await fetch(`${API}/todos`, { headers: await getHeaders() });
                if (res.status === 401) logout();
                allTodos = await res.json();
                const list = document.getElementById('task-list');
                
                if (allTodos.length === 0) {
                    list.innerHTML = '<div class="empty-state">📭 Нет задач. Добавь первую!</div>';
                    return;
                }
                
                const today = new Date().toISOString().split('T')[0];
                list.innerHTML = allTodos.map(t => {
                    const isOverdue = !t.completed && t.due_date && t.due_date < today;
                    return `
                        <li class="task-item ${t.completed ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}">
                            <div class="task-content">
                                <div class="task-title">${t.title}</div>
                                <div class="task-meta">
                                    <span class="category-badge">${t.category}</span>
                                    ${t.due_date ? `<span class="due-date">📅 ${formatDate(t.due_date)} ${isOverdue ? '(просрочено)' : ''}</span>` : ''}
                                    ${t.description ? `<span>📝 ${t.description}</span>` : ''}
                                </div>
                            </div>
                            <div class="task-actions">
                                <button class="btn-done" onclick="toggleTodo(${t.id})">${t.completed ? '↩️' : '✅'}</button>
                                <button class="btn-del" onclick="deleteTodo(${t.id})">🗑️</button>
                            </div>
                        </li>
                    `;
                }).join('');
            } catch (e) { console.error(e); }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU');
        }

        function exportToCSV() {
            if (allTodos.length === 0) return alert("Нет задач для экспорта!");

            let csvContent = "Название,Категория,Статус,Срок,Описание\n";
            
            allTodos.forEach(t => {
                const status = t.completed ? "Выполнено" : "В процессе";
                const desc = t.description ? t.description.replace(/,/g, " ") : "";
                csvContent += `"${t.title}","${t.category}","${status}","${t.due_date || ''}","${desc}"\n`;
            });

            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "todo_tasks.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function addTodo() {
            const title = document.getElementById('task-title').value.trim();
            if (!title) return alert('Введите название задачи!');
            
            await fetch(`${API}/todos`, {
                method: 'POST',
                headers: await getHeaders(),
                body: JSON.stringify({
                    title: title,
                    description: document.getElementById('task-desc').value,
                    category: document.getElementById('task-category').value || 'Общее',
                    due_date: document.getElementById('task-date').value || null
                })
            });
            
            document.getElementById('task-title').value = '';
            document.getElementById('task-desc').value = '';
            document.getElementById('task-date').value = '';
            await refreshAll();
        }

        async function toggleTodo(id) {
            const task = allTodos.find(t => t.id === id);
            if (!task) return;
            
            await fetch(`${API}/todos/${id}`, {
                method: 'PUT',
                headers: await getHeaders(),
                body: JSON.stringify({ completed: !task.completed })
            });
            await refreshAll();
        }

        async function deleteTodo(id) {
            await fetch(`${API}/todos/${id}`, {
                method: 'DELETE',
                headers: await getHeaders()
            });
            await refreshAll();
        }

        async function refreshAll() {
