<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Tracker Pro</title>
    <style>
        /* ... (твои старые стили оставляем, добавляем новые) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 1rem; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Auth Styles */
        .auth-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-width: 400px; margin: 50px auto; text-align: center; }
        .auth-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .auth-btn { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .auth-btn:hover { background: #5568d3; }
        .auth-switch { margin-top: 15px; font-size: 0.9rem; color: #666; cursor: pointer; text-decoration: underline; }
        
        /* App Styles */
        .hidden { display: none !important; }
        .header { display: flex; justify-content: space-between; align-items: center; color: white; margin-bottom: 20px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 15px; color: white; border-radius: 20px; cursor: pointer; }
        .logout-btn:hover { background: rgba(255,255,255,0.4); }
        
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-grid input, .form-grid select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .add-btn { grid-column: 1 / -1; background: #4caf50; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f9f9f9; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #667eea; }
        .task-item.completed { opacity: 0.6; text-decoration: line-through; border-left-color: #ccc; }
        .task-actions button { margin-left: 5px; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; }
        .btn-done { background: #4caf50; }
        .btn-del { background: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- AUTH SCREEN -->
        <div id="auth-screen" class="auth-container hidden">
            <h2 id="auth-title">Вход</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Пароль">
            <button class="auth-btn" onclick="handleAuth()" id="auth-action-btn">Войти</button>
            <div class="auth-switch" onclick="toggleAuthMode()" id="auth-switch-text">Нет аккаунта? Зарегистрироваться</div>
            <p id="auth-error" style="color: red; margin-top: 10px; display: none;"></p>
        </div>

        <!-- APP SCREEN -->
        <div id="app-screen" class="hidden">
            <div class="header">
                <h1>Todo Tracker Pro</h1>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>

            <div class="card">
                <h3>Новая задача</h3>
                <div class="form-grid">
                    <input type="text" id="task-title" placeholder="Название">
                    <input type="text" id="task-category" placeholder="Категория">
                    <input type="text" id="task-desc" placeholder="Описание" style="grid-column: 1/-1;">
                    <input type="date" id="task-date">
                    <button class="add-btn" onclick="addTodo()">Добавить</button>
                </div>
            </div>

            <div class="card">
                <h3>Мои задачи</h3>
                <ul id="task-list" style="list-style: none; padding: 0;"></ul>
            </div>
        </div>

    </div>

    <script>
        const API = ""; // Пусто, т.к. фронтенд и бэкенд на одном домене
        let isLogin = true;

        // Инициализация
        window.onload = function() {
            const token = localStorage.getItem('token');
            if (token) {
                showApp();
            } else {
                showAuth();
            }
        };

        function showAuth() {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            loadTodos();
        }

        function toggleAuthMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Вход" : "Регистрация";
            document.getElementById('auth-action-btn').innerText = isLogin ? "Войти" : "Создать аккаунт";
            document.getElementById('auth-switch-text').innerText = isLogin ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти";
            document.getElementById('auth-error').style.display = 'none';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');
            
            try {
                if (isLogin) {
                    // Логин
                    const res = await fetch(`${API}/token`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, password })
                    });
                    if (!res.ok) throw new Error('Неверный логин или пароль');
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    showApp();
                } else {
                    // Регистрация
                    const res = await fetch(`${API}/auth/register`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email, password })
                    });
                    if (!res.ok) throw new Error('Ошибка регистрации (возможно email занят)');
                    alert('Аккаунт создан! Теперь войди.');
                    toggleAuthMode();
                }
            } catch (e) {
                errorEl.innerText = e.message;
                errorEl.style.display = 'block';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        // --- TODOS LOGIC ---

        async function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            };
        }

        async function loadTodos() {
            try {
                const res = await fetch(`${API}/todos`, { headers: await getHeaders() });
                if (res.status === 401) logout(); // Если токен протух
                const todos = await res.json();
                const list = document.getElementById('task-list');
                list.innerHTML = todos.map(t => `
                    <li class="task-item ${t.completed ? 'completed' : ''}">
                        <div>
                            <strong>${t.title}</strong> <small>(${t.category})</small><br>
                            <small>${t.description || ''} ${t.due_date ? '| 📅 ' + t.due_date : ''}</small>
                        </div>
                        <div class="task-actions">
                            <button class="btn-done" onclick="toggleTodo(${t.id})">${t.completed ? '↩️' : '✅'}</button>
                            <button class="btn-del" onclick="deleteTodo(${t.id})">🗑️</button>
                        </div>
                    </li>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function addTodo() {
            const title = document.getElementById('task-title').value;
            if (!title) return alert('Введите название');
            
            await fetch(`${API}/todos`, {
                method: 'POST',
                headers: await getHeaders(),
                body: JSON.stringify({
                    title: title,
                    description: document.getElementById('task-desc').value,
                    category: document.getElementById('task-category').value || 'Общее',
                    due_date: document.getElementById('task-date').value || null
                })
            });
            document.getElementById('task-title').value = '';
            loadTodos();
        }

        async function toggleTodo(id) {
            // Просто переключаем статус
            await fetch(`${API}/todos/${id}`, {
                method: 'PUT',
                headers: await getHeaders(),
                body: JSON.stringify({ completed: true }) // Упрощено
            });
            loadTodos();
        }

        async function deleteTodo(id) {
            await fetch(`${API}/todos/${id}`, {
                method: 'DELETE',
                headers: await getHeaders()
            });
            loadTodos();
        }
    </script>
</body>
</html>
