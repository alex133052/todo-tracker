<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Tracker</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f5; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 0.5rem; margin: 0.5rem 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        ul { list-style: none; padding: 0; }
        li { padding: 0.5rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .completed { text-decoration: line-through; color: #888; }
        .actions button { width: auto; margin-left: 0.5rem; padding: 0.3rem 0.6rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2> Мои задачи</h2>
        <input type="text" id="title" placeholder="Название задачи">
        <input type="text" id="desc" placeholder="Описание (необязательно)">
        <button onclick="addTodo()">Добавить</button>
        <ul id="list"></ul>
    </div>

    <script>
        async function loadTodos() {
            const res = await fetch('/todos');
            const todos = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = todos.map(t => `
                <li class="${t.completed ? 'completed' : ''}">
                    <span>${t.title}</span>
                    <div class="actions">
                        <button onclick="toggle(${t.id})">✅</button>
                        <button onclick="del(${t.id})" style="background:#dc3545">🗑️</button>
                    </div>
                </li>
            `).join('');
        }

        async function addTodo() {
            const title = document.getElementById('title').value;
            if(!title) return alert('Введите название!');
            await fetch('/todos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, description: document.getElementById('desc').value})
            });
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
            loadTodos();
        }

        async function toggle(id) {
            await fetch(`/todos/${id}`, {method: 'PUT'});
            loadTodos();
        }

        async function del(id) {
            await fetch(`/todos/${id}`, {method: 'DELETE'});
            loadTodos();
        }

        loadTodos();
    </script>
</body>
</html>
