<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Tracker Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
        }

        .main-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .todo-list {
            margin-top: 20px;
        }

        .todo-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }

        .todo-card:hover {
            transform: translateX(5px);
        }

        /* ✅ СТИЛИ ДЛЯ ПРИОРИТЕТОВ */
        .priority-high { border-left-color: #e74c3c; background: #fff5f5; }
        .priority-medium { border-left-color: #f39c12; background: #fffaf0; }
        .priority-low { border-left-color: #2ecc71; background: #f0fff4; }

        .todo-card h3 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .todo-card p {
            color: #7f8c8d;
            margin-bottom: 10px;
        }

        .todo-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        /* ✅ СТИЛИ ДЛЯ БЕЙДЖЕЙ */
        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            display: inline-block;
        }

        .badge-high { background: #e74c3c; }
        .badge-medium { background: #f39c12; }
        .badge-low { background: #2ecc71; }

        .category-badge {
            background: #3498db;
        }

        .tag-badge {
            background: #95a5a6;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            color: white;
        }

        .todo-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.9rem;
        }

        .completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .auth-form {
            max-width: 400px;
            margin: 50px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Авторизация -->
        <div id="auth-section" class="auth-form">
            <h2 id="auth-title">Вход</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Войти</button>
            </form>
            <p style="text-align: center; margin-top: 15px;">
                <a href="#" id="toggle-auth">Нет аккаунта? Зарегистрироваться</a>
            </p>
        </div>

        <!-- Основной контент -->
        <div id="main-section" class="hidden">
            <header>
                <h1>📋 Todo Tracker Pro</h1>
                <div>
                    <span id="user-email" style="margin-right: 15px;"></span>
                    <button class="btn btn-danger" onclick="logout()">Выйти</button>
                </div>
            </header>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="stat-total">0</h3>
                    <p>Всего задач</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-completed">0</h3>
                    <p>Выполнено</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-pending">0</h3>
                    <p>В процессе</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-overdue">0</h3>
                    <p>Просрочено</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-rate">0%</h3>
                    <p>Успешность</p>
                </div>
            </div>

            <div class="main-content">
                <button class="btn btn-primary" onclick="openModal()">+ Новая задача</button>
                <div id="todo-list" class="todo-list"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания/редактирования -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Новая задача</h2>
            <form id="task-form">
                <div class="form-group">
                    <label>Название задачи *</label>
                    <input type="text" id="task-title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="task-description" class="form-input" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Категория</label>
                    <select id="task-category" class="form-select">
                        <option value="Общее">Общее</option>
                        <option value="Работа">Работа</option>
                        <option value="Личное">Личное</option>
                        <option value="Покупки">Покупки</option>
                        <option value="Здоровье">Здоровье</option>
                    </select>
                </div>
                
                <!-- ✅ ПОЛЕ ПРИОРИТЕТА -->
                <div class="form-group">
                    <label>Приоритет</label>
                    <select id="task-priority" class="form-select">
                        <option value="low">✅ Низкий</option>
                        <option value="medium" selected>⚠️ Средний</option>
                        <option value="high">🔥 Высокий</option>
                    </select>
                </div>

                <!-- ✅ ПОЛЕ ТЕГОВ -->
                <div class="form-group">
                    <label>Теги (через запятую)</label>
                    <input type="text" id="task-tags" class="form-input" placeholder="срочно, важно, дом">
                </div>

                <div class="form-group">
                    <label>Срок выполнения</label>
                    <input type="date" id="task-due-date" class="form-input">
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1">Сохранить</button>
                    <button type="button" class="btn btn-danger" onclick="closeModal()" style="flex: 1">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    let token = localStorage.getItem('token');
    let isRegistering = false;
    let editingTodoId = null;
    let todos = []; // ✅ Добавили глобальную переменную

    // Проверка авторизации
    if (token) {
        showMainSection();
    }

    // Переключение вход/регистрация
    document.getElementById('toggle-auth').addEventListener('click', (e) => {
        e.preventDefault();
        isRegistering = !isRegistering;
        document.getElementById('auth-title').textContent = isRegistering ? 'Регистрация' : 'Вход';
        e.target.textContent = isRegistering ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Зарегистрироваться';
    });

    // Обработка формы авторизации
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            if (isRegistering) {
                await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                alert('Регистрация успешна! Проверьте email для подтверждения.');
            } else {
                const res = await fetch('/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    token = data.access_token;
                    localStorage.setItem('token', token);
                    showMainSection();
                } else {
                    const error = await res.json();
                    alert('Ошибка: ' + (error.detail || 'Неверный email или пароль'));
                }
            }
        } catch (err) {
            alert('Ошибка: ' + err.message);
        }
    });

    function showMainSection() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        loadTodos();
        loadStatistics();
    }

    function logout() {
        localStorage.removeItem('token');
        token = null;
        location.reload();
    }

    // ✅ ИСПРАВЛЕННАЯ Загрузка задач
    async function loadTodos() {
        try {
            const res = await fetch('/todos', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                todos = await res.json(); // ✅ Сохраняем в глобальную переменную
                console.log('Загружено задач:', todos.length); // ✅ Лог для отладки
                renderTodos(todos);
            } else {
                console.error('Ошибка загрузки задач:', res.status);
            }
        } catch (err) {
            console.error('Error loading todos:', err);
        }
    }

    // ✅ ИСПРАВЛЕННАЯ Отрисовка задач
    function renderTodos(todos) {
        const list = document.getElementById('todo-list');
        list.innerHTML = '';

        if (todos.length === 0) {
            list.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">Нет задач. Создайте первую! 📝</p>';
            return;
        }

        todos.forEach(todo => {
            const card = document.createElement('div');
            card.className = `todo-card priority-${todo.priority} ${todo.completed ? 'completed' : ''}`;
            
            // Форматируем теги
            let tagsHtml = '';
            if (todo.tags && todo.tags.trim()) {
                const tags = todo.tags.split(',');
                tagsHtml = tags.map(tag => `<span class="tag-badge">${tag.trim()}</span>`).join('');
            }

            // Текст приоритета
            const priorityText = todo.priority === 'high' ? '🔥 Высокий' : 
                                (todo.priority === 'medium' ? '⚠️ Средний' : '✅ Низкий');

            card.innerHTML = `
                <h3>${todo.title}</h3>
                <p>${todo.description || 'Нет описания'}</p>
                <div class="todo-meta">
                    <span class="badge badge-${todo.priority}">${priorityText}</span>
                    <span class="badge category-badge">${todo.category}</span>
                    ${todo.due_date ? `<span class="badge" style="background: #9b59b6">📅 ${new Date(todo.due_date).toLocaleDateString('ru-RU')}</span>` : ''}
                </div>
                ${tagsHtml ? `<div style="margin-top: 10px">${tagsHtml}</div>` : ''}
                <div class="todo-actions">
                    <button class="btn btn-success btn-small" onclick="toggleComplete(${todo.id})">
                        ${todo.completed ? '↩️ Вернуть' : '✔️ Выполнить'}
                    </button>
                    <button class="btn btn-primary btn-small" onclick="editTodo(${todo.id})">✏️ Редактировать</button>
                    <button class="btn btn-danger btn-small" onclick="deleteTodo(${todo.id})">🗑️ Удалить</button>
                </div>
            `;

            list.appendChild(card);
        });
    }

    // Загрузка статистики
    async function loadStatistics() {
        try {
            const res = await fetch('/statistics', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const stats = await res.json();
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-completed').textContent = stats.completed;
                document.getElementById('stat-pending').textContent = stats.pending;
                document.getElementById('stat-overdue').textContent = stats.overdue;
                document.getElementById('stat-rate').textContent = stats.completion_rate + '%';
            }
        } catch (err) {
            console.error('Error loading stats:', err);
        }
    }

    // Открытие модального окна
    function openModal() {
        document.getElementById('task-modal').classList.add('active');
        document.getElementById('modal-title').textContent = 'Новая задача';
        document.getElementById('task-form').reset();
        // Устанавливаем средний приоритет по умолчанию
        document.getElementById('task-priority').value = 'medium';
        editingTodoId = null;
    }

    // Закрытие модального окна
    function closeModal() {
        document.getElementById('task-modal').classList.remove('active');
    }

    // Отправка формы
    document.getElementById('task-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const todoData = {
            title: document.getElementById('task-title').value,
            description: document.getElementById('task-description').value,
            category: document.getElementById('task-category').value,
            priority: document.getElementById('task-priority').value,
            tags: document.getElementById('task-tags').value,
            due_date: document.getElementById('task-due-date').value
        };

        console.log('Отправка задачи:', todoData); // ✅ Лог

        try {
            if (editingTodoId) {
                const res = await fetch(`/todos/${editingTodoId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(todoData)
                });
                if (res.ok) {
                    console.log('Задача обновлена');
                }
            } else {
                const res = await fetch('/todos', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(todoData)
                });
                if (res.ok) {
                    console.log('Задача создана');
                }
            }
            closeModal();
            loadTodos();
            loadStatistics();
        } catch (err) {
            console.error('Ошибка сохранения:', err);
            alert('Ошибка сохранения задачи');
        }
    });

    // ✅ ИСПРАВЛЕННАЯ Выполнение задачи
    async function toggleComplete(id) {
        const todo = todos.find(t => t.id === id); // ✅ Теперь работает
        if (todo) {
            try {
                await fetch(`/todos/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ completed: !todo.completed })
                });
                loadTodos();
                loadStatistics();
            } catch (err) {
                console.error('Ошибка обновления:', err);
            }
        }
    }

    // ✅ ИСПРАВЛЕННОЕ Редактирование задачи
    async function editTodo(id) {
        const todo = todos.find(t => t.id === id); // ✅ Теперь работает
        
        if (todo) {
            document.getElementById('modal-title').textContent = 'Редактировать задачу';
            document.getElementById('task-title').value = todo.title;
            document.getElementById('task-description').value = todo.description || '';
            document.getElementById('task-category').value = todo.category;
            document.getElementById('task-priority').value = todo.priority;
            document.getElementById('task-tags').value = todo.tags || '';
            document.getElementById('task-due-date').value = todo.due_date || '';
            editingTodoId = id;
            document.getElementById('task-modal').classList.add('active');
        }
    }

    // Удаление задачи
    async function deleteTodo(id) {
        if (confirm('Удалить задачу?')) {
            try {
                await fetch(`/todos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                loadTodos();
                loadStatistics();
            } catch (err) {
                console.error('Ошибка удаления:', err);
            }
        }
    }

    // Закрытие модального окна по клику вне его
    document.getElementById('task-modal').addEventListener('click', (e) => {
        if (e.target.id === 'task-modal') {
            closeModal();
        }
    });
</script>
</body>
</html>
